name: Build & Docs

# Reusable workflow shared by ci.yml (push/PR gate) and release.yml
# (tag publish). Keeps build + docs identical between the two so a
# release never runs on a commit that could not pass the same checks
# main has to pass.

on:
  workflow_call: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: pip install hatchling build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel installs
        run: pip install dist/*.whl

      - name: Smoke test ── theme registers
        run: python -c "import clarity; print(clarity.__version__)"

      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.12'
        with:
          name: dist
          path: dist/

  docs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install theme and Sphinx
        run: pip install -e '.[docs]' sphinx

      - name: Build documentation
        run: sphinx-build -W -b html docs/source docs/build/html

      - uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/build/html/
