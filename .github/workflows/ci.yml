name: CI

# Tag / release workflow. PyPI's Trusted Publisher is bound to this
# filename (.github/workflows/ci.yml) so the publish job MUST live here.
# Main-branch and PR checks live in main.yml instead.
#
# Flow: tag push -> reusable build + docs -> publish to PyPI + GitHub
# release. If build or docs fails, publish is skipped by needs: and
# nothing is released.

on:
  push:
    tags: ['v*']

jobs:
  check:
    uses: ./.github/workflows/build-and-docs.yml

  publish:
    needs: check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install git-cliff
        run: pip3 install git-cliff

      - name: Generate release notes
        run: git-cliff --config cliff.toml --latest --strip header > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -q "^v0\."; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG \
            dist/*
