<div id="clarity-consent" class="clarity-consent" hidden>
  <div class="consent-inner">
    <div class="consent-text">
      <strong>Privacy Notice</strong>
      This site uses <code>localStorage</code> to save your preferences
      (theme, text size) and optionally stores API keys for the AI assistant.
      When using the default font stack, fonts are loaded from Google Fonts.
      No cookies are set. No analytics or tracking.
      <a id="consent-privacy-link" href="{{ pathto('privacy') }}">Learn more</a>
    </div>
    <div class="consent-actions">
      <button id="consent-accept" type="button" title="Accept all: enable localStorage and external fonts">&#x2713; Accept all</button>
      <button id="consent-decline" type="button" title="Decline all: features work in the current tab but nothing persists across visits">&#xD7; Decline all</button>
      <button id="consent-customize" type="button" title="Customize: pick which features may remember data and for how long">&#x2699; Customize...</button>
    </div>
  </div>
</div>
