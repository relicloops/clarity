[theme]
inherit = basic
stylesheet = css/clarity.css
pygments_style = clarity-light
pygments_dark_style = clarity-dark
sidebars = sidebar.html

[options]
light_logo =
dark_logo =
sidebar_hide_name = False
navigation_with_keys = True
default_theme = system
show_toc_level = 2
font_stack = default
chatbot_enabled = True
chatbot_model = openai/gpt-oss-120b:free
chatbot_max_tokens = 1024
chatbot_temperature = 0.3
chatbot_top_p = 1.0
chatbot_frequency_penalty = 0.0
chatbot_presence_penalty = 0.0
chatbot_page_text_limit = 8000
chatbot_max_history = 50
chatbot_reasoning_effort =
chatbot_system_prompt =
update_check = False
retro_404 = True
skin = default
